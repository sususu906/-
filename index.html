<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>科研贡献测算系统入口</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--line:#e6ebf2;--blue:#2563eb;--soft:#eaf2ff;--shadow:0 18px 45px rgba(15,23,42,.08);--r:22px}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#f8fbff,#f3f6fb);color:var(--text)}
.wrap{max-width:1280px;margin:0 auto;padding:24px}
.hero{background:linear-gradient(135deg,#1d4ed8,#2563eb 55%,#60a5fa);color:#fff;border-radius:28px;padding:32px;box-shadow:var(--shadow)}
.hero h1{margin:0;font-size:34px;line-height:1.25}
.sectionTitle{margin:24px 0 14px}
.sectionTitle h2{margin:0;font-size:22px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column;gap:14px}
.card h3{margin:0;font-size:19px}
.tag{display:inline-flex;width:max-content;background:var(--soft);color:var(--blue);font-size:12px;font-weight:800;border-radius:999px;padding:6px 10px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}
.btn{display:inline-flex;align-items:center;justify-content:center;height:40px;border-radius:13px;padding:0 15px;text-decoration:none;font-size:14px;font-weight:900}
.btn.primary{background:var(--blue);color:#fff}
.btn.light{background:#f3f4f6;color:#111827}
.wide{grid-column:span 2}
@media(max-width:980px){.grid{grid-template-columns:1fr}.wide{grid-column:auto}.wrap{padding:14px}.hero{padding:22px}.hero h1{font-size:28px}}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>科研贡献测算系统入口</h1>
  </section>

  <div class="sectionTitle"><h2>推荐入口</h2></div>
  <div class="grid">
    <article class="card wide">
      <span class="tag">综合入口</span>
      <h3>科研贡献综合测算系统</h3>
      <div class="actions">
        <a class="btn primary" href="systems/combined.html">进入综合系统</a>
        <a class="btn light" href="systems/result-report.html">查看结果报告</a>
      </div>
    </article>

    <article class="card">
      <span class="tag">报告</span>
      <h3>评价结果报告</h3>
      <div class="actions">
        <a class="btn primary" href="systems/result-report.html">打开报告</a>
      </div>
    </article>
  </div>

  <div class="sectionTitle"><h2>单独系统入口</h2></div>
  <div class="grid">
    <article class="card">
      <span class="tag">DEA</span>
      <h3>DEA+Malmquist 指数法</h3>
      <div class="actions">
        <a class="btn primary" href="systems/dea-malmquist.html">进入系统</a>
      </div>
    </article>

    <article class="card">
      <span class="tag">LMDI</span>
      <h3>LMDI 法</h3>
      <div class="actions">
        <a class="btn primary" href="systems/lmdi.html">进入系统</a>
      </div>
    </article>

    <article class="card">
      <span class="tag">生产函数</span>
      <h3>生产函数法</h3>
      <div class="actions">
        <a class="btn primary" href="systems/production-function.html">进入系统</a>
      </div>
    </article>

    <article class="card">
      <span class="tag">余值法</span>
      <h3>余值法</h3>
      <div class="actions">
        <a class="btn primary" href="systems/residual-method.html">进入系统</a>
      </div>
    </article>
  </div>
</div>
</body>
</html>
