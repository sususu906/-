<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>DEA+Malmquist指数科研贡献测算系统</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#667085;--line:#e6ebf2;--blue:#2563eb;--soft:#eaf2ff;--shadow:0 10px 30px rgba(15,23,42,.06);--r:18px}
*{box-sizing:border-box} body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1600px;margin:0 auto;padding:22px} .hero{background:linear-gradient(135deg,#1d4ed8,#2563eb 55%,#60a5fa);color:#fff;padding:24px 28px;border-radius:24px;box-shadow:var(--shadow);margin-bottom:18px}
.hero h1{margin:0;font-size:28px} .hero p{margin:8px 0 0;font-size:14px;line-height:1.8;opacity:.95}
.grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px} @media (max-width:1200px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px} .title h2{margin:0;font-size:18px}
.badge{font-size:12px;font-weight:800;color:var(--blue);background:var(--soft);padding:6px 10px;border-radius:999px}
.kpiGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px} @media(max-width:900px){.kpiGrid{grid-template-columns:1fr 1fr}}
.kpi{padding:14px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#f8fbff)} .kpi .k{font-size:12px;color:var(--muted)} .kpi .v{font-size:24px;font-weight:900;margin-top:6px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px} table{border-collapse:collapse;width:100%;min-width:780px} th,td{padding:9px 10px;border-bottom:1px solid #eef2f7;text-align:center;white-space:nowrap;font-size:13px} th{background:#f8fafc;color:#475569;position:sticky;top:0;z-index:1}
input,select{border:1px solid #d6dde8;border-radius:10px;padding:6px 8px;font-size:13px;background:#fff} input[type="number"]{width:100px} input.name{width:190px}
input.code{width:120px} .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button{height:38px;border:none;border-radius:12px;padding:0 14px;font-size:14px;font-weight:800;cursor:pointer} .primary{background:var(--blue);color:#fff} .light{background:#f3f4f6;color:#111827} .danger{background:#fff1f2;color:#be123c}
.small{font-size:12px;color:var(--muted);line-height:1.8} .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;background:var(--soft);color:var(--blue)}
.ok{color:#027a48;font-weight:800} .warn{color:#b54708;font-weight:800} .mono{font-family:Consolas,Menlo,monospace}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>DEA+Malmquist指数科研贡献测算系统</h1>
    
  </section>

  <div class="card">
    <div class="title"><h2>指标设置</h2></div>
    <div class="toolbar" style="margin-bottom:10px">
      <button class="primary" onclick="addCustomIndicator()">新增自定义指标</button>
      <button class="light" onclick="addPresetIndicator()">从预设新增指标</button>
      <button class="light" onclick="resetIndicators()">恢复默认指标</button>
      <button class="light" onclick="recalcAll()">重新计算</button>
    </div>
    <div class="tableWrap"><table id="indicatorTable"></table></div>
    
  </div>

  <div class="grid">
    <div>
      <section class="card">
        <div class="title"><h2>30个决策单元数据输入</h2><span class="badge">逐行录入</span></div>
        <div class="toolbar" style="margin-bottom:10px">
          <button class="primary" onclick="addDataRow()">新增行</button>
          <button class="danger" onclick="deleteLastDataRow()">删除最后一行</button>
          <button class="light" onclick="resetAll()">恢复默认数据</button>
        </div>
        <div class="tableWrap"><table id="dataTable"></table></div>
      </section>

      <section class="card">
        <div class="title"><h2>CCR技术效率结果</h2><span class="badge">求解结果</span></div>
        <div class="tableWrap"><table id="effTable"></table></div>
      </section>
    </div>

    <div>
      <section class="card">
        <div class="title"><h2>Malmquist分解结果</h2><span class="badge">标准方法</span></div>
        <div class="kpiGrid">
          <div class="kpi"><div class="k">DMU数量</div><div class="v" id="kDMU">--</div></div>
          <div class="kpi"><div class="k">投入指标数</div><div class="v" id="kIn">--</div></div>
          <div class="kpi"><div class="k">产出指标数</div><div class="v" id="kOut">--</div></div>
          <div class="kpi"><div class="k">2022-2025平均贡献率</div><div class="v" id="kAvg">--</div></div>
        </div>
        <div class="tableWrap" style="margin-top:12px"><table id="resultTable"></table></div>
      </section>

      <section class="card">
        <div class="title"><h2>当前指标汇总</h2><span class="badge">便于核对</span></div>
        <div class="tableWrap"><table id="summaryTable"></table></div>
      </section>
    </div>
  </div>
</div>

function num(v){ const n=Number(v); return Number.isFinite(n)?n:0; }

function uniq(arr){ return [...new Set(arr)]; }
function avg(arr){ return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : NaN; }
function avgFinite(arr){ const v=arr.filter(x=>Number.isFinite(x)); return v.length?avg(v):NaN; }
function fmt(v,d=4){ return Number.isFinite(v)?Number(v).toFixed(d):'--'; }
function fmt2(v,d=2){ return Number.isFinite(v)?Number(v).toFixed(d):'--'; }
function pct(v,d=2){ return Number.isFinite(v)?Number(v).toFixed(d)+'%':'--'; }
function safeDiv(a,b){ return (!Number.isFinite(a)||!Number.isFinite(b))?NaN:a/Math.max(Math.abs(b),1e-10); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }

function buildDefaultPanel(){
  const panel = [];
  DEFAULT_TOTALS.forEach(row=>{
    const yr = String(row.year);
    const shares = BASE_SHARES[yr] || [];
    shares.forEach((base, idx)=>{
      const rec = {project: base.project, year: row.year};
      rec.oil_output = +(row.oil_output * num(base.oil_output)).toFixed(6);
      rec.explore_rd = +(row.explore_rd * num(base.explore_rd)).toFixed(6);
      rec.develop_rd = +(row.develop_rd * num(base.develop_rd)).toFixed(6);
      rec.equip_value = +(row.equip_value * num(base.equip_value)).toFixed(6);
      rec.develop_invest_ref = +(row.develop_invest_ref * num(base.equip_value)).toFixed(6);
      rec.rd_total = +(rec.explore_rd + rec.develop_rd).toFixed(6);
      rec.total_invest = +(rec.develop_invest_ref + rec.equip_value).toFixed(6);
      rec.input_staff = Math.max(1, Math.round(rec.oil_output * 2.4 + (idx%3===0?1:0)));
      rec.active_wells = Math.max(1, Math.round(rec.oil_output * 1.3));
      rec.recoverable_reserve = +(rec.oil_output * (5.0 + (idx%5)*0.15)).toFixed(6);
      rec.new_reserve = +(rec.oil_output * (0.72 + (idx%4)*0.03)).toFixed(6);
      rec.operating_cost = +(rec.oil_output * 2200).toFixed(6);
      rec.profit = +(rec.oil_output * 850).toFixed(6);
      rec.net_profit = +(rec.profit * 0.84).toFixed(6);
      rec.cost_per_ton = +(rec.operating_cost / Math.max(rec.oil_output,1e-10)).toFixed(6);
      rec.custom_a = 0; rec.custom_b = 0;
      panel.push(rec);
    });
    // last row exact adjustment for key defaults
    const yearRows = panel.filter(r=>r.year===row.year);
    if(yearRows.length){
      const last = yearRows[yearRows.length-1];
      ['oil_output','explore_rd','develop_rd','equip_value','develop_invest_ref'].forEach(k=>{
        const target = num(row[k]);
        const current = yearRows.slice(0,-1).reduce((s,r)=>s+num(r[k]),0);
        last[k] = +(target-current).toFixed(6);
      });
      last.rd_total = +(last.explore_rd + last.develop_rd).toFixed(6);
      last.total_invest = +(last.develop_invest_ref + last.equip_value).toFixed(6);
      last.recoverable_reserve = +(last.oil_output * (5.0 + ((yearRows.length-1)%5)*0.15)).toFixed(6);
      last.new_reserve = +(last.oil_output * (0.72 + ((yearRows.length-1)%4)*0.03)).toFixed(6);
      last.operating_cost = +(last.oil_output * 2200).toFixed(6);
      last.profit = +(last.oil_output * 850).toFixed(6);
      last.net_profit = +(last.profit * 0.84).toFixed(6);
      last.cost_per_ton = +(last.operating_cost / Math.max(last.oil_output,1e-10)).toFixed(6);
      last.input_staff = Math.max(1, Math.round(last.oil_output * 2.4));
      last.active_wells = Math.max(1, Math.round(last.oil_output * 1.3));
    }
  });

}

      <td><button class="light" style="height:32px;padding:0 10px" onclick="removeIndicator(${idx})">删除</button></td>
    </tr>`;
  });
  html += '</tbody>';
  document.getElementById('indicatorTable').innerHTML = html;
}
function updateIndicatorKey(idx,val){
  if(indicators.some((x,i)=>i!==idx && x.key===val)){ alert('同一个指标只能选择一次。'); renderIndicatorTable(); return; }
  indicators[idx].key = val;
  indicators[idx].label = fieldLabelByKey(val);
  indicators[idx].custom = isEditableCustomKey(val);
  ensureIndicatorFieldOnRows(val, 0);
  renderIndicatorTable(); renderDataTable(); recalcAll();
}
function updateIndicatorLabel(idx,val){
  const text = String(val || '').trim();
  indicators[idx].label = text || defaultCustomLabel(indicators[idx].key, idx);
  renderIndicatorTable(); renderDataTable(); recalcAll();
}
function updateIndicatorRole(idx,val){ indicators[idx].role = val; renderIndicatorTable(); renderDataTable(); recalcAll(); }
function addPresetIndicator(){
  const remain = AVAILABLE_FIELDS.find(f=>!indicators.some(x=>x.key===f.key));
  if(!remain){ alert('预设指标已全部加入，可直接新增自定义指标。'); return; }
  indicators.push({key:remain.key,label:remain.label,role:'ignore',custom:false});
  ensureIndicatorFieldOnRows(remain.key, 0);
  renderIndicatorTable(); renderDataTable(); recalcAll();
}
function addCustomIndicator(){
  const key = nextCustomIndicatorKey();
  indicators.push({key,label:`自定义指标${customIndicatorSeed}`,role:'ignore',custom:true});
  ensureIndicatorFieldOnRows(key, 0);
  renderIndicatorTable(); renderDataTable(); recalcAll();
}
function removeIndicator(idx){
  if(indicators.length<=1){ alert('至少保留一个指标。'); return; }
  indicators.splice(idx,1);
  renderIndicatorTable(); renderDataTable(); recalcAll();
}
function resetIndicators(){ indicators = clone(DEFAULT_INDICATORS); renderIndicatorTable(); renderDataTable(); recalcAll(); }

function renderDataTable(){
  sortPanel();
  let html = '<thead><tr><th>项目</th><th>年份</th>' + indicators.map(x=>`<th>${esc(x.label)}<br><span class="pill">${x.role==='ignore'?'不参与':x.role==='input'?'投入':'产出'}</span></th>`).join('') + '<th>操作</th></tr></thead><tbody>';
  panelRows.forEach((row,idx)=>{
    html += `<tr><td><input class="code" value="${esc(row.project)}" onchange="updatePanelField(${idx}, 'project', this.value)"></td><td><input type="number" step="1" value="${row.year}" onchange="updatePanelField(${idx}, 'year', this.value)"></td>`;
    indicators.forEach(it=>{
      html += `<td><input type="number" step="any" value="${row[it.key] ?? 0}" onchange="updatePanelField(${idx}, '${it.key}', this.value)"></td>`;
    });
    html += `<td><button class="light" style="height:32px;padding:0 10px" onclick="removeDataRow(${idx})">删除</button></td></tr>`;
  });
  html += '</tbody>';
  document.getElementById('dataTable').innerHTML = html;
}
function updatePanelField(idx,key,val){
  if(key==='project') panelRows[idx][key] = String(val).trim() || 'DMU';
  else if(key==='year') panelRows[idx][key] = Math.round(num(val));
  else panelRows[idx][key] = num(val);
  if(key==='explore_rd' || key==='develop_rd') panelRows[idx].rd_total = +(num(panelRows[idx].explore_rd)+num(panelRows[idx].develop_rd)).toFixed(6);
  if(key==='develop_invest_ref' || key==='equip_value') panelRows[idx].total_invest = +(num(panelRows[idx].develop_invest_ref)+num(panelRows[idx].equip_value)).toFixed(6);
  if(key==='operating_cost' || key==='oil_output') panelRows[idx].cost_per_ton = +(num(panelRows[idx].operating_cost)/Math.max(num(panelRows[idx].oil_output),1e-10)).toFixed(6);
  recalcAll(false);
}
function addDataRow(){
  const last = panelRows[panelRows.length-1] || {project:'DMU01',year:2019};
  const next = clone(last);
  next.project = last.project || 'DMU01';
  next.year = num(last.year) || 2019;
  panelRows.push(next);
  renderDataTable();
}
function removeDataRow(idx){ if(panelRows.length<=2){alert('至少保留两行数据。'); return;} panelRows.splice(idx,1); renderDataTable(); recalcAll(); }
function deleteLastDataRow(){ if(panelRows.length<=2){alert('至少保留两行数据。'); return;} panelRows.pop(); renderDataTable(); recalcAll(); }

function renderSummaryTable(){
  const years = uniq(panelRows.map(r=>r.year)).sort((a,b)=>a-b);
  let html = '<thead><tr><th>年份</th><th>DMU数</th>' + indicators.map(x=>`<th>${esc(x.label)}</th>`).join('') + '</tr></thead><tbody>';
  years.forEach(y=>{
    const rowsY = panelRows.filter(r=>r.year===y);
    html += `<tr><td>${y}</td><td>${rowsY.length}</td>`;
    indicators.forEach(it=>{
      const s = rowsY.reduce((sum,r)=>sum+num(r[it.key]),0);
      html += `<td>${fmt2(s,2)}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('summaryTable').innerHTML = html;
}

function simplexMax(A,b,c){
  const m=A.length, n=c.length;
  const width=n+m+1;
  const T=Array.from({length:m+1},()=>Array(width).fill(0));
  const basis=[];
  for(let i=0;i<m;i++){
    const bi = Number.isFinite(b[i]) ? b[i] : 0;
    if (bi < -1e-9) return {ok:false};
    for(let j=0;j<n;j++) T[i][j]=A[i][j]||0;
    T[i][n+i]=1; T[i][width-1]=bi; basis[i]=n+i;
  }
  for(let j=0;j<n;j++) T[m][j]=-(c[j]||0);
  const tol=1e-9;
  for(let iter=0; iter<2000; iter++){
    let pc=-1,minVal=-tol;
    for(let j=0;j<width-1;j++) if(T[m][j]<minVal){minVal=T[m][j];pc=j;}
    if(pc===-1){
      const x=Array(n).fill(0);
      for(let i=0;i<m;i++) if(basis[i]<n) x[basis[i]]=T[i][width-1];
      return {ok:true,x,obj:T[m][width-1]};
    }
    let pr=-1,bestRatio=Infinity;
    for(let i=0;i<m;i++){
      const a=T[i][pc];
      if(a>tol){
        const ratio=T[i][width-1]/a;
        if(ratio<bestRatio-tol || (Math.abs(ratio-bestRatio)<=tol && basis[i]>(basis[pr]??Infinity))){bestRatio=ratio;pr=i;}
      }
    }
    if(pr===-1) return {ok:false};
    const piv=T[pr][pc];
    for(let j=0;j<width;j++) T[pr][j]/=piv;
    for(let i=0;i<m+1;i++){
      if(i===pr) continue;
      const factor=T[i][pc]; if(Math.abs(factor)<=tol) continue;
      for(let j=0;j<width;j++) T[i][j]-=factor*T[pr][j];
    }
    basis[pr]=pc;
  }
  return {ok:false};
}
function deaMultiplier(target, peers, inputs, outputs, rts='CRS'){
  const n=peers.length, m=inputs.length, s=outputs.length;
  if(!target || !n || !m || !s) return NaN;
  if(n<=1) return 1;
  const x0=inputs.map(k=>pos(target[k]));
  const y0=outputs.map(k=>pos(target[k]));
  const extra = rts==='VRS' ? 2 : 0;
  const pIdx=s+m, nIdx=s+m+1, varCount=s+m+extra;
  const A=[], b=[];
  for(let j=0;j<n;j++){
    const row=Array(varCount).fill(0);
    for(let r=0;r<s;r++) row[r]=pos(peers[j][outputs[r]]);
    for(let i=0;i<m;i++) row[s+i]=-pos(peers[j][inputs[i]]);
    if(rts==='VRS'){ row[pIdx]=1; row[nIdx]=-1; }
    A.push(row); b.push(0);
  }
  const normRow=Array(varCount).fill(0);
  for(let i=0;i<m;i++) normRow[s+i]=pos(x0[i]);
  A.push(normRow); b.push(1);
  const c=Array(varCount).fill(0);
  for(let r=0;r<s;r++) c[r]=pos(y0[r]);
  if(rts==='VRS'){ c[pIdx]=1; c[nIdx]=-1; }
  const sol=simplexMax(A,b,c);
  if(!sol.ok || !Number.isFinite(sol.obj)) return NaN;
  return Math.max(1e-10, sol.obj);
}
function buildRowLookup(rows){ const map=new Map(); rows.forEach(r=>map.set(`${r.project}__${r.year}`,r)); return map; }
function computeMalmquist(panel){
  const inputs=activeInputs(), outputs=activeOutputs();
  if(inputs.length<1) return {error:'请至少选择1个投入指标。'};
  if(outputs.length!==1) return {error:'请恰好选择1个产出指标。'};
  const years=uniq(panel.map(r=>r.year)).sort((a,b)=>a-b);
  const projects=uniq(panel.map(r=>r.project)).sort();
  const rowLookup=buildRowLookup(panel);
  const frontierByYear = new Map(years.map(y=>[y,panel.filter(r=>r.year===y)]));
  const effCache = new Map();
  const getEff=(target,frontierYear,rts='CRS')=>{
    const key=`${rts}__${frontierYear}__${target.project}__${target.year}__${inputs.join('|')}__${outputs.join('|')}`;
    if(effCache.has(key)) return effCache.get(key);
    const val=deaMultiplier(target, frontierByYear.get(frontierYear)||[], inputs, outputs, rts);
    effCache.set(key,val); return val;
  };
  const resultRows=[];
  const outputKey=outputs[0];
  const efficiencyRows=[];
  years.forEach(y=>{
    projects.forEach(project=>{
      const row = rowLookup.get(`${project}__${y}`);
      if(!row) return;
      let hit = efficiencyRows.find(d=>d.project===project);
      if(!hit){ hit = {project}; efficiencyRows.push(hit); }
      hit[String(y)] = getEff(row,y,'CRS');
    });
  });
  efficiencyRows.forEach(r=>{ r.avg = avgFinite(years.map(y=>r[String(y)])); });
  const efficiencyAvgRow = {avg: avgFinite(efficiencyRows.map(r=>r.avg))};
  years.forEach(y=>{ efficiencyAvgRow[String(y)] = avgFinite(efficiencyRows.map(r=>r[String(y)])); });
  for(let i=1;i<years.length;i++){
    const t=years[i-1], tp=years[i];
    const common = projects.filter(p=>rowLookup.has(`${p}__${t}`) && rowLookup.has(`${p}__${tp}`));
    const detail=[];
    common.forEach(project=>{
      const rt=rowLookup.get(`${project}__${t}`), rp=rowLookup.get(`${project}__${tp}`);
      const crs_tt=getEff(rt,t,'CRS');
      const crs_t_tp=getEff(rp,t,'CRS');
      const crs_tp_t=getEff(rt,tp,'CRS');
      const crs_tp_tp=getEff(rp,tp,'CRS');
      const effch=safeDiv(crs_tp_tp, crs_tt);
      const techch=Math.sqrt(Math.max(1e-12, safeDiv(crs_t_tp, crs_tp_tp) * safeDiv(crs_tt, crs_tp_t)));
      const tfpch=effch*techch;
      const growth=safeDiv(num(rp[outputKey])-num(rt[outputKey]), pos(rt[outputKey]))*100;
      detail.push({effch,techch,tfpch,growth});
    });
    const outBase=avgFinite(common.map(p=>num(rowLookup.get(`${p}__${t}`)[outputKey])));
    const outNext=avgFinite(common.map(p=>num(rowLookup.get(`${p}__${tp}`)[outputKey])));
    const growth=safeDiv(outNext-outBase, pos(outBase))*100;
    const tfpch=avgFinite(detail.map(d=>d.tfpch));
    const effch=avgFinite(detail.map(d=>d.effch));
    const techch=avgFinite(detail.map(d=>d.techch));
    const contrib = Math.abs(growth)<1e-10 ? NaN : (tfpch-1)/(growth/100)*100;
    resultRows.push({period:`${t}-${tp}`, tfpch, effch, techch, growth, contrib, n:common.length});
  }
  return {years, inputs, outputs, projects, resultRows, efficiencyRows, efficiencyAvgRow};
}

function renderEfficiency(){
  const el=document.getElementById('effTable');
  if(!currentResult || currentResult.error){ el.innerHTML = `<tbody><tr><td>${currentResult?.error || '暂无结果'}</td></tr></tbody>`; return; }
  const headers=['项目', ...currentResult.years.map(y=>`${y}年`), '平均值'];
  let html='<thead><tr>'+headers.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>';
  currentResult.efficiencyRows.forEach(r=>{
    html += '<tr><td>'+r.project+'</td>' + currentResult.years.map(y=>`<td>${fmt(r[String(y)],4)}</td>`).join('') + `<td>${fmt(r.avg,4)}</td></tr>`;
  });
  html += '<tr><td><b>平均值</b></td>' + currentResult.years.map(y=>`<td><b>${fmt(currentResult.efficiencyAvgRow[String(y)],4)}</b></td>`).join('') + `<td><b>${fmt(currentResult.efficiencyAvgRow.avg,4)}</b></td></tr>`;
  html += '</tbody>';
  el.innerHTML = html;
}
function renderResults(){
  document.getElementById('kDMU').textContent = uniq(panelRows.map(r=>r.project)).length;
  document.getElementById('kIn').textContent = activeInputs().length;
  document.getElementById('kOut').textContent = activeOutputs().length;
  const el=document.getElementById('resultTable');
  if(!currentResult || currentResult.error){ document.getElementById('kAvg').textContent='--'; el.innerHTML = `<tbody><tr><td>${currentResult?.error || '暂无结果'}</td></tr></tbody>`; renderSummaryTable(); return; }
  const avgContrib = avgFinite(currentResult.resultRows.filter(r=>['2022-2023','2023-2024','2024-2025'].includes(r.period)).map(r=>r.contrib));
  document.getElementById('kAvg').textContent = pct(avgContrib,2);
  let html='<thead><tr><th>时期</th><th>tfpch</th><th>effch</th><th>techch</th><th>产量增长率/%</th><th>TFP对产出变化贡献率/%</th><th>共同DMU数</th></tr></thead><tbody>';
  currentResult.resultRows.forEach(r=>{
    html += `<tr><td>${r.period}</td><td>${fmt(r.tfpch,4)}</td><td>${fmt(r.effch,4)}</td><td>${fmt(r.techch,4)}</td><td>${fmt2(r.growth,2)}</td><td>${fmt2(r.contrib,2)}</td><td>${r.n}</td></tr>`;
  });
  html += '</tbody>';
  el.innerHTML = html;
  renderSummaryTable();
}
function recalcAll(full=true){
  const outCount = activeOutputs().length;
  if(outCount !== 1){ currentResult = {error:'请恰好选择1个产出指标。'}; renderIndicatorTable(); renderDataTable(); renderEfficiency(); renderResults(); return; }
  if(activeInputs().length < 1){ currentResult = {error:'请至少选择1个投入指标。'}; renderIndicatorTable(); renderDataTable(); renderEfficiency(); renderResults(); return; }
  currentResult = computeMalmquist(panelRows.filter(r=>r.project && num(r.year)>0));
  renderIndicatorTable(); renderDataTable(); renderEfficiency(); renderResults();
}
function resetAll(){ indicators = clone(DEFAULT_INDICATORS); panelRows = buildDefaultPanel(); indicators.forEach(it=>ensureIndicatorFieldOnRows(it.key, 0)); renderIndicatorTable(); renderDataTable(); recalcAll(); }

resetAll();
