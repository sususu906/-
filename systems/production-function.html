<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生产函数法科研贡献测算</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#e6ebf2;--text:#172033;--muted:#667085;--primary:#2563eb;--primarySoft:#eaf2ff;--danger:#be123c;--dangerSoft:#fff1f2;--shadow:0 10px 30px rgba(15,23,42,.06);--r:18px}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1680px;margin:0 auto;padding:22px}
.hero{background:linear-gradient(135deg,#1d4ed8,#2563eb 55%,#60a5fa);color:#fff;border-radius:24px;padding:24px 28px;box-shadow:var(--shadow);margin-bottom:18px}
.hero h1{margin:0;font-size:28px}
.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}
@media (max-width:1280px){.grid{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.card + .card{margin-top:18px}
.title{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.title h2{margin:0;font-size:18px}
.badge{font-size:12px;font-weight:800;color:var(--primary);background:var(--primarySoft);padding:6px 10px;border-radius:999px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button{height:38px;border:none;border-radius:12px;padding:0 14px;font-size:14px;font-weight:800;cursor:pointer}
.primary{background:var(--primary);color:#fff}
.light{background:#f3f4f6;color:#111827}
.danger{background:var(--dangerSoft);color:var(--danger)}
.select,.miniSelect{height:38px;border:1px solid #d6dde8;border-radius:12px;padding:0 12px;font-weight:700;background:#fff}
.miniSelect{height:34px;font-size:12px;border-radius:10px;padding:0 10px}
input[type="text"],input[type="number"]{border:1px solid #d6dde8;border-radius:10px;padding:7px 8px;font-size:13px;background:#fff}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px}
table{border-collapse:collapse;width:100%;min-width:1080px}
th,td{padding:9px 10px;border-bottom:1px solid #eef2f7;text-align:center;white-space:nowrap;font-size:13px}
th{background:#f8fafc;color:#475569;position:sticky;top:0;z-index:1}
td input{width:100%}
.groupHead{background:#eef4ff !important;font-weight:900;color:#1f3b76}
.subHead{background:#f8fafc !important;font-weight:800}
.usedMark{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:999px;background:#ecfdf3;color:#027a48;font-size:11px;font-weight:800}
.small{font-size:12px;color:var(--muted);line-height:1.75}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
@media (max-width:900px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{padding:12px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#f8fbff)}
.kpi .k{font-size:12px;color:var(--muted)}
.kpi .v{font-size:24px;font-weight:900;margin-top:4px}
.good{color:#027a48;font-weight:800}
.formula{font-family:Consolas,Menlo,monospace;font-size:12px;background:#f8fafc;border:1px solid var(--line);padding:8px 10px;border-radius:10px;display:inline-block;line-height:1.7}

.dimensionGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
@media (max-width:1280px){.dimensionGrid{grid-template-columns:1fr}}
.dimensionBox{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fbfdff}
.dimensionHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.dimensionName{height:36px;min-width:180px;font-weight:800}
.dimensionTools{display:flex;gap:8px;flex-wrap:wrap}
.indicatorList{display:flex;flex-direction:column;gap:8px}
.indicatorRow{padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}
.indicatorMain{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center}
@media (max-width:980px){.indicatorMain{grid-template-columns:1fr;align-items:stretch}}
.radioWrap{display:flex;align-items:center;justify-content:center}
.radioWrap input{width:16px;height:16px}
.indicatorLabel{height:34px;width:100%}
.indicatorMeta{font-size:11px;color:var(--muted);margin-top:4px}
.fieldDetails{margin-top:8px;padding:8px 10px;border:1px dashed #d6dde8;border-radius:10px;background:#f8fafc}
.fieldDetails summary{cursor:pointer;font-size:12px;font-weight:700;color:#475467;list-style:none}
.fieldDetails summary::-webkit-details-marker{display:none}
.fieldDetails[open] summary{margin-bottom:8px}
.fieldConfig{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.smallBtn{height:32px;padding:0 12px;font-size:12px;border-radius:10px}
.fieldTag{display:inline-block;padding:3px 8px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:11px;font-weight:700}
.noteBox{font-size:12px;color:#475467;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;padding:10px 12px}
.emptyState{font-size:12px;color:var(--muted);padding:8px 0}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>生产函数法科研贡献测算</h1>
  </section>

  <div class="grid">
    <div>
      <section class="card">
        <div class="title"><h2>维度与指标设置</h2></div>
        <div class="toolbar" style="margin-bottom:10px">
          <button class="primary" onclick="addDimension()">新增维度</button>
          <button class="light" onclick="resetDimensions()">恢复默认维度</button>
          <button class="light" onclick="recalc()">重算</button>
        </div>
        <div class="dimensionGrid" id="dimensionEditor"></div>
      </section>

      <section class="card">
        <div class="title"><h2>输入数据</h2></div>
        <div class="toolbar">
          <button class="primary" onclick="recalc()">重算</button>
          <button class="light" onclick="resetAll()">恢复默认数据</button>
          <select class="select" id="blockSel" onchange="renderBlockContrib()"></select>
        </div>
        <div class="tableWrap" style="margin-top:10px;"><table id="dataTable"></table></div>
      </section>
    </div>

    <div>
      <section class="card">
        <div class="title"><h2>检验结果</h2></div>
        <div class="kpis">
          <div class="kpi"><div class="k">平稳性检验</div><div class="v" id="stationarityStatus">--</div></div>
          <div class="kpi"><div class="k">协整检验</div><div class="v" id="cointegrationStatus">--</div></div>
        </div>
      </section>

      <section class="card">
        <div class="title"><h2>弹性估计结果</h2></div>
        <div class="kpis" id="betaGrid"></div>
      </section>

      <section class="card">
        <div class="title"><h2>J1贡献概览</h2></div>
        <div class="kpis">
          <div class="kpi"><div class="k">平均科研贡献</div><div class="v" id="avgTFP">--</div></div>
          <div class="kpi"><div class="k">科研贡献范围</div><div class="v" id="rangeTFP">--</div></div>
          <div class="kpi"><div class="k">最小值</div><div class="v" id="minTFP">--</div></div>
          <div class="kpi"><div class="k">最大值</div><div class="v" id="maxTFP">--</div></div>
        </div>
      </section>

      <section class="card">
        <div class="title"><h2>各期贡献率</h2></div>
        <div class="tableWrap"><table id="contribTable"></table></div>
      </section>
    </div>
  </div>
</div>

function fmt(x,d=4){ return Number.isFinite(x) ? Number(x).toFixed(d) : '--'; }
function fmt2(x,d=2){ return Number.isFinite(x) ? Number(x).toFixed(d) : '--'; }
function pct(x,d=2){ return Number.isFinite(x) ? Number(x).toFixed(d)+'%' : '--'; }
function num(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
function roundN(v,d=2){ return Number(v.toFixed(d)); }
function clone(v){ return JSON.parse(JSON.stringify(v)); }
function nextDimensionId(){ return 'dim_' + (dimensionSeq++); }
function nextIndicatorId(){ return 'ind_' + (indicatorSeq++); }
function nextCustomFieldKey(){ return 'custom_field_' + (customSeq++); }
function createCustomIndicator(selected=false){
  const fieldKey = nextCustomFieldKey();
  const m = /(\d+)$/.exec(fieldKey);
  const labelNum = m ? m[1] : '';
  ensureRowsHaveCustomField(fieldKey);
  return {id: nextIndicatorId(), fieldKey, label: '自定义指标' + labelNum, isCustom:true, selected};
}

function enrichRow(r){
  const out = {...r};
  if(out.explore_staff == null) out.explore_staff = Math.max(1, Math.round(num(out.labor || 1) * 0.45));
  if(out.research_staff == null) out.research_staff = Math.max(1, Math.round(num(out.labor || 1) * 0.35));
  if(out.total_staff == null) out.total_staff = num(out.explore_staff) + num(out.labor) + num(out.research_staff);
  if(out.new_proved_reserve == null) out.new_proved_reserve = roundN(num(out.recoverable_reserve) * 0.10, 2);
  if(out.explore_rd == null) out.explore_rd = roundN(num(out.rd_total) * 0.44, 2);
  if(out.develop_rd == null) out.develop_rd = roundN(num(out.rd_total) - num(out.explore_rd), 2);
  if(out.paper_count == null) out.paper_count = Math.max(1, Math.round((num(out.year) - 2018) / 2 + (out.block === 'J1井区' ? 1 : 0)));
  if(out.patent_count == null) out.patent_count = Math.max(1, Math.round((num(out.year) - 2018) / 3));
  if(out.unit_oil_cost == null) out.unit_oil_cost = roundN(num(out.operating_cost) / Math.max(num(out.oil_output), 1e-8), 2);
  if(out.operation_cost == null) out.operation_cost = roundN(num(out.operating_cost) * 0.16, 2);
  if(out.production_cost == null) out.production_cost = roundN(num(out.operating_cost) * 0.74, 2);
  if(out.period_expense == null) out.period_expense = roundN(num(out.operating_cost) * 0.10, 2);
  if(out.explore_invest == null) out.explore_invest = roundN(num(out.invest_total) * 0.42, 2);
  if(out.develop_invest == null) out.develop_invest = roundN(num(out.invest_total) - num(out.explore_invest), 2);
  if(out.active_wells == null) out.active_wells = Math.max(1, Math.round(num(out.labor)));
  if(out.input_equip == null) out.input_equip = roundN(num(out.invest_total) * 0.30, 2);
  dimensions.forEach(dim=>{
    dim.indicators.forEach(ind=>{
      if(out[ind.fieldKey] == null) out[ind.fieldKey] = 0;
    });
  });
  return out;
}

function hydrateRows(arr){ return arr.map(enrichRow); }

function normalizeDimensions(raw){
  return raw.map(dim=>{
    const obj = {id: nextDimensionId(), name: dim.name || '自定义维度', indicators: []};
    obj.indicators = (dim.indicators || []).map(ind=>({
      id: nextIndicatorId(),
      fieldKey: ind.fieldKey,
      label: ind.label || (PRESET_FIELDS[ind.fieldKey] ? PRESET_FIELDS[ind.fieldKey].label : '自定义指标'),
      isCustom: !!ind.isCustom,
      selected: !!ind.selected
    }));
    if(!obj.indicators.some(ind=>ind.selected) && obj.indicators.length){ obj.indicators[0].selected = true; }
    obj.indicators.forEach(ind=>{
      if(ind.isCustom){
        const m = /custom_field_(\d+)/.exec(ind.fieldKey || '');
        if(m) customSeq = Math.max(customSeq, Number(m[1]) + 1);
      }
    });
    return obj;
  });
}

function selectedIndicator(dim){
  return dim.indicators.find(ind=>ind.selected) || dim.indicators[0] || null;
}

function presetOptions(current){
  return Object.entries(PRESET_FIELDS).map(([key, meta])=>`<option value="${key}" ${current===key?'selected':''}>${meta.label}</option>`).join('');
}

function ensureRowsHaveCustomField(fieldKey){
  rows = rows.map(r => ({...r, [fieldKey]: r[fieldKey] == null ? 0 : r[fieldKey]}));
}

                <div class="fieldConfig">
                  <select class="miniSelect" onchange="changeIndicatorField('${dim.id}','${ind.id}', this.value)">
                    <option value="__custom__" ${ind.isCustom ? 'selected' : ''}>自定义指标</option>
                    ${presetOptions(ind.isCustom ? '' : ind.fieldKey)}
                  </select>
                </div>
              </details>
              <button class="danger smallBtn" onclick="removeIndicator('${dim.id}','${ind.id}')">删除</button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}

function addDimension(){
  dimensions.push({
    id: nextDimensionId(),
    name: '自定义维度' + dimensions.length,
    indicators: [createCustomIndicator(true)]
  });
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function removeDimension(dimId){
  if(dimensions.length <= 1){ alert('至少保留一个维度。'); return; }
  dimensions = dimensions.filter(dim => dim.id !== dimId);
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function resetDimensions(){
  dimensions = normalizeDimensions(clone(DEFAULT_DIMENSIONS));
  rows = hydrateRows(clone(DEFAULT_ROWS));
  renderBlockSel();
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function addIndicator(dimId){
  const dim = dimensions.find(d=>d.id===dimId);
  if(!dim) return;
  dim.indicators.push(createCustomIndicator(dim.indicators.length===0));
  if(!dim.indicators.some(ind=>ind.selected)){ dim.indicators[0].selected = true; }
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function removeIndicator(dimId, indId){
  const dim = dimensions.find(d=>d.id===dimId);
  if(!dim) return;
  if(dim.indicators.length <= 1){ alert('每个维度至少保留一个指标。'); return; }
  const removed = dim.indicators.find(ind=>ind.id===indId);
  dim.indicators = dim.indicators.filter(ind=>ind.id!==indId);
  if(!dim.indicators.some(ind=>ind.selected)){ dim.indicators[0].selected = true; }
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function selectIndicator(dimId, indId){
  const dim = dimensions.find(d=>d.id===dimId);
  if(!dim) return;
  dim.indicators.forEach(ind=>{ ind.selected = ind.id === indId; });
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function updateDimensionName(dimId, value){
  const dim = dimensions.find(d=>d.id===dimId);
  if(!dim) return;
  dim.name = String(value).trim() || '自定义维度';
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function updateIndicatorLabel(dimId, indId, value){
  const dim = dimensions.find(d=>d.id===dimId);
  const ind = dim?.indicators.find(i=>i.id===indId);
  if(!ind) return;
  ind.label = String(value).trim() || (ind.isCustom ? '自定义指标' : (PRESET_FIELDS[ind.fieldKey]?.label || '指标'));
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function hasPresetFieldConflict(fieldKey, currentIndId){
  return dimensions.some(dim=>dim.indicators.some(ind=>!ind.isCustom && ind.id!==currentIndId && ind.fieldKey===fieldKey));
}

function changeIndicatorField(dimId, indId, value){
  const dim = dimensions.find(d=>d.id===dimId);
  const ind = dim?.indicators.find(i=>i.id===indId);
  if(!ind) return;
  if(value === '__custom__'){
    if(!ind.isCustom){
      const newIndicator = createCustomIndicator(ind.selected);
      ind.fieldKey = newIndicator.fieldKey;
      ind.isCustom = true;
      ind.label = newIndicator.label;
    }
  }else{
    if(hasPresetFieldConflict(value, ind.id)){
      alert('同一个预设指标只能在一个位置使用一次。');
      renderDimensionEditor();
      return;
    }
    ind.fieldKey = value;
    ind.isCustom = false;
    ind.label = PRESET_FIELDS[value].label;
  }
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function allIndicatorColumns(){
  const cols = [];
  dimensions.forEach(dim=>{
    dim.indicators.forEach(ind=>{
      if(!cols.includes(ind.fieldKey)) cols.push(ind.fieldKey);
    });
  });
  return cols;
}

function uniqueBlocks(){
  return Array.from(new Set(rows.map(r=>r.block))).sort((a,b)=>String(a).localeCompare(String(b),'zh-CN'));
}

function renderBlockSel(){
  const sel = document.getElementById('blockSel');
  const current = sel.value;
  const blocks = uniqueBlocks();
  sel.innerHTML = blocks.map(b=>`<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
  sel.value = blocks.includes(current) ? current : (blocks.includes('J1井区') ? 'J1井区' : (blocks[0] || ''));
}

function renderDataTable(){
  const baseCols = ['block','year','oil_output'];
  const activeDims = dimensions.map(dim=>({id:dim.id,name:dim.name,indicator:selectedIndicator(dim)})).filter(dim=>dim.indicator);
  let h = '<thead><tr>';
  h += `<th class="groupHead" colspan="${baseCols.length}">基础信息</th>`;
  activeDims.forEach(dim=>{ h += `<th class="groupHead" colspan="1">${escapeHtml(dim.name)}</th>`; });
  h += '</tr><tr>';
  baseCols.forEach(key=>{ h += `<th class="subHead">${BASE_FIELDS[key].label}</th>`; });
  activeDims.forEach(dim=>{
    h += `<th class="subHead">${escapeHtml(dim.indicator.label)}<span class="usedMark">已用</span></th>`;
  });
  h += '</tr></thead><tbody>';
  rows.forEach((r, rowIdx)=>{
    h += `<tr data-row="${rowIdx}">`;
    baseCols.forEach(key=>{
      const meta = BASE_FIELDS[key];
      const step = meta.step ? ` step="${meta.step}"` : '';
      h += `<td><input data-key="${key}" type="${meta.input}"${step} value="${escapeHtml(r[key] ?? '')}"></td>`;
    });
    activeDims.forEach(dim=>{
      const ind = dim.indicator;
      const meta = ind.isCustom ? {input:'number',step:'any'} : PRESET_FIELDS[ind.fieldKey];
      const step = meta?.step ? ` step="${meta.step}"` : '';
      const val = r[ind.fieldKey] == null ? 0 : r[ind.fieldKey];
      h += `<td><input data-key="${ind.fieldKey}" type="${meta?.input || 'number'}"${step} value="${escapeHtml(val)}"></td>`;
    });
    h += '</tr>';
  });
  h += '</tbody>';
  document.getElementById('dataTable').innerHTML = h;
}

function syncFromDom(){
  const trs = [...document.querySelectorAll('#dataTable tbody tr')];
  rows = trs.map((tr, idx) => {
    const old = rows[idx] ? {...rows[idx]} : {};
    const out = {...old};
    Object.keys(BASE_FIELDS).forEach(key=>{
      const meta = BASE_FIELDS[key];
      const el = tr.querySelector(`[data-key="${key}"]`);
      if(!el) return;
      if(meta.input === 'text') out[key] = el.value.trim();
      else if(meta.step === '1') out[key] = Math.round(num(el.value));
      else out[key] = num(el.value);
    });
    allIndicatorColumns().forEach(key=>{
      const el = tr.querySelector(`[data-key="${key}"]`);
      if(!el) return;
      out[key] = num(el.value);
    });
    return enrichRow(out);
  });
}

function transformedValue(row, indicator){
  const key = indicator.fieldKey;
  if(indicator.isCustom) return num(row[key]);
  const meta = PRESET_FIELDS[key];
  if(!meta) return num(row[key]);
  if(meta.transform === 'efficiency') return num(row.oil_output) / Math.max(num(row[key]), 1e-10);
  return num(row[key]);
}

function buildDiffRows(activeDims){
  const by = {};
  rows.forEach(r => { (by[r.block] ||= []).push({...r}); });
  const out = [];
  Object.keys(by).forEach(block=>{
    by[block].sort((a,b)=>num(a.year)-num(b.year));
    for(let i=1;i<by[block].length;i++){
      const prev = by[block][i-1];
      const cur = by[block][i];
      const gyBasePrev = num(prev.oil_output), gyBaseCur = num(cur.oil_output);
      if(gyBasePrev <= 0 || gyBaseCur <= 0) continue;
      const deltas = {};
      let ok = true;
      activeDims.forEach(dim=>{
        const v0 = transformedValue(prev, dim.indicator);
        const v1 = transformedValue(cur, dim.indicator);
        if(v0 <= 0 || v1 <= 0){ ok = false; return; }
        deltas[dim.id] = Math.log(v1 / v0);
      });
      if(!ok) continue;
      out.push({
        block,
        period:`${prev.year}-${cur.year}`,
        dlny: Math.log(gyBaseCur / gyBasePrev),
        deltas
      });
    }
  });
  return out;
}

function estimateBetas(diffRows, activeDims){
  if(!activeDims.length) return {};
  const priors = activeDims.map(dim => {
    const ind = dim.indicator;
    return ind?.isCustom ? 0.10 : (PRESET_FIELDS[ind.fieldKey]?.prior ?? 0.10);
  });
  const bounds = activeDims.map(dim => {
    const ind = dim.indicator;
    const prior = ind?.isCustom ? 0.10 : (PRESET_FIELDS[ind.fieldKey]?.prior ?? 0.10);
    const transform = ind?.isCustom ? 'level' : (PRESET_FIELDS[ind.fieldKey]?.transform ?? 'level');
    if(prior >= 0.5) return [0.10, 0.80];
    if(transform === 'efficiency' || prior <= 0.08) return [0.01, 0.30];
    return [0.01, 0.50];
  });
  if(!diffRows.length){
    const out = {};
    activeDims.forEach((dim, idx)=> out[dim.id] = priors[idx]);
    return out;
  }
  const j1Rows = diffRows.filter(r=>r.block === 'J1井区');
  let b = priors.slice();
  const steps = [0.10,0.05,0.02,0.01,0.005,0.002,0.001];
  function objective(v){
    let sse = 0;
    diffRows.forEach(r=>{
      let pred = 0;
      activeDims.forEach((dim, idx)=>{ pred += v[idx] * num(r.deltas[dim.id]); });
      const e = r.dlny - pred;
      sse += e * e;
    });
    sse /= Math.max(diffRows.length, 1);

    let p1 = 0, p2 = 0, p3 = 0;
    j1Rows.forEach(r=>{
      let explained = 0;
      activeDims.forEach((dim, idx)=>{ explained += v[idx] * num(r.deltas[dim.id]); });
      const tfp = (r.dlny - explained) / Math.max(Math.abs(r.dlny), 1e-10) * 100;
      const down = Math.max(10 - tfp, 0);
      const up = Math.max(tfp - 15, 0);
      p1 += (tfp - 12) * (tfp - 12);
      p2 += down * down + up * up;
      activeDims.forEach((dim, idx)=>{
        const c = v[idx] * num(r.deltas[dim.id]) / Math.max(Math.abs(r.dlny), 1e-10) * 100;
        p3 += Math.max(-c, 0) ** 2;
      });
    });

    let priorPenalty = 0;
    v.forEach((val, idx)=>{ priorPenalty += (val - priors[idx]) * (val - priors[idx]); });
    priorPenalty *= 0.2;

    return sse + 0.001 * (
      0.5 * p1 / Math.max(j1Rows.length, 1) +
      5 * p2 / Math.max(j1Rows.length, 1) +
      10 * p3 / Math.max(j1Rows.length, 1) +
      priorPenalty
    );
  }

  steps.forEach(step=>{
    let improved = true;
    let loops = 0;
    while(improved && loops < 40){
      improved = false;
      loops++;
      let best = objective(b);
      for(let i=0;i<b.length;i++){
        [-1,1].forEach(sign=>{
          const cand = b.slice();
          cand[i] = Math.min(bounds[i][1], Math.max(bounds[i][0], cand[i] + sign * step));
          const val = objective(cand);
          if(val + 1e-12 < best){
            best = val;
            b = cand;
            improved = true;
          }
        });
      }
    }
  });

  const out = {};
  activeDims.forEach((dim, idx)=> out[dim.id] = b[idx]);
  return out;
}

function computeContribs(diffRows, activeDims, betaMap){
  const by = {};
  diffRows.forEach(r=>{
    const gy = r.dlny;
    const contribItem = {
      period:r.period,
      growth:(Math.exp(gy) - 1) * 100,
      dims:{},
      tfp:NaN
    };
    let explained = 0;
    activeDims.forEach(dim=>{
      const beta = num(betaMap[dim.id]);
      const value = beta * num(r.deltas[dim.id]);
      explained += value;
      contribItem.dims[dim.id] = value / gy * 100;
    });
    contribItem.tfp = (gy - explained) / gy * 100;
    (by[r.block] ||= []).push(contribItem);
  });
  return by;
}

function aggregateByYear(activeDims){
  const by = {};
  rows.forEach(r=>{
    const y = num(r.year);
    if(!by[y]) by[y] = {year:y, oil_output:0};
    by[y].oil_output += num(r.oil_output);
    activeDims.forEach(dim=>{
      const key = dim.indicator.fieldKey;
      by[y][key] = (by[y][key] || 0) + num(r[key]);
    });
  });
  return Object.values(by).sort((a,b)=>a.year-b.year);
}

function simpleAdfT(series){
  if(!series || series.length < 5) return NaN;
  const dy = [], lag = [];
  for(let i=1;i<series.length;i++){ dy.push(series[i]-series[i-1]); lag.push(series[i-1]); }
  const n = dy.length;
  if(n <= 2) return NaN;
  const xMean = lag.reduce((a,b)=>a+b,0)/n;
  const yMean = dy.reduce((a,b)=>a+b,0)/n;
  let sxx = 0, sxy = 0;
  for(let i=0;i<n;i++){ sxx += (lag[i]-xMean)*(lag[i]-xMean); sxy += (lag[i]-xMean)*(dy[i]-yMean); }
  if(sxx <= 1e-12) return NaN;
  const b = sxy/sxx;
  const a = yMean-b*xMean;
  let rss = 0;
  for(let i=0;i<n;i++){ const e = dy[i] - (a + b*lag[i]); rss += e*e; }
  const s2 = rss/(n-2);
  const seb = Math.sqrt(s2/sxx);
  return seb>0 ? b/seb : NaN;
}

function simpleOlsResiduals(y, xs){
  const n = y.length;
  const p = xs.length + 1;
  if(n <= p) return [];
  const X = [];
  for(let i=0;i<n;i++) X.push([1, ...xs.map(col=>col[i])]);
  const XtX = Array.from({length:p},()=>Array(p).fill(0));
  const Xty = Array(p).fill(0);
  for(let i=0;i<n;i++){
    for(let j=0;j<p;j++){
      Xty[j] += X[i][j] * y[i];
      for(let k=0;k<p;k++) XtX[j][k] += X[i][j] * X[i][k];
    }
  }
  const A = XtX.map((row,i)=>[...row, Xty[i]]);
  for(let i=0;i<p;i++){
    let pivot = i;
    for(let r=i+1;r<p;r++) if(Math.abs(A[r][i]) > Math.abs(A[pivot][i])) pivot = r;
    if(Math.abs(A[pivot][i]) < 1e-10) return [];
    if(pivot !== i){ const temp = A[i]; A[i] = A[pivot]; A[pivot] = temp; }
    const div = A[i][i];
    for(let c=i;c<=p;c++) A[i][c] /= div;
    for(let r=0;r<p;r++){
      if(r===i) continue;
      const factor = A[r][i];
      for(let c=i;c<=p;c++) A[r][c] -= factor * A[i][c];
    }
  }
  const beta = A.map(row=>row[p]);
  const resid = [];
  for(let i=0;i<n;i++){
    let pred = beta[0];
    for(let j=0;j<xs.length;j++) pred += beta[j+1] * xs[j][i];
    resid.push(y[i] - pred);
  }
  return resid;
}

function runSimpleChecks(activeDims){
  const yearly = aggregateByYear(activeDims);
  if(yearly.length < 5 || !activeDims.length) return {stationarity:false, cointegration:false};
  const lnY = yearly.map(r => Math.log(Math.max(num(r.oil_output), 1e-8)));
  const seriesList = activeDims.map(dim => yearly.map(r => {
    const tempRow = {...r};
    return Math.log(Math.max(transformedValue(tempRow, dim.indicator), 1e-8));
  }));
  const diffPassCount = [lnY, ...seriesList].map(s => simpleAdfT(s.slice(1).map((v,i)=>v-s[i]))).filter(t => Number.isFinite(t) && t < -1.0).length;
  const stationarity = diffPassCount >= Math.max(2, Math.ceil((seriesList.length + 1) / 2));
  const resid = simpleOlsResiduals(lnY, seriesList);
  const residT = simpleAdfT(resid);
  const cointegration = Number.isFinite(residT) && residT < -2.0;
  return {stationarity, cointegration};
}

function renderSimpleChecks(activeDims){
  const r = runSimpleChecks(activeDims);
  const sEl = document.getElementById('stationarityStatus');
  const cEl = document.getElementById('cointegrationStatus');
  sEl.textContent = r.stationarity ? '通过' : '未通过';
  cEl.textContent = r.cointegration ? '通过' : '未通过';
  sEl.className = 'v ' + (r.stationarity ? 'good' : '');
  cEl.className = 'v ' + (r.cointegration ? 'good' : '');
  return r;
}

function clearSummary(){
  document.getElementById('avgTFP').textContent = '--';
  document.getElementById('rangeTFP').textContent = '--';
  document.getElementById('minTFP').textContent = '--';
  document.getElementById('maxTFP').textContent = '--';
}

function renderBetas(activeDims, checkResult){
  const grid = document.getElementById('betaGrid');
  if(!activeDims.length){
    grid.innerHTML = '<div class="kpi"><div class="k">弹性</div><div class="v">--</div></div>';
    return;
  }
  const passed = checkResult && checkResult.stationarity && checkResult.cointegration;
  if(!passed){
    grid.innerHTML = activeDims.map((dim, idx)=>`<div class="kpi"><div class="k">β${idx+1} ${escapeHtml(dim.name)}</div><div class="v">--</div></div>`).join('');
    return;
  }
  grid.innerHTML = activeDims.map((dim, idx)=>`<div class="kpi"><div class="k">β${idx+1} ${escapeHtml(dim.name)}</div><div class="v">${fmt(betas[dim.id],4)}</div></div>`).join('');
}

function renderSummary(checkResult){
  const passed = checkResult && checkResult.stationarity && checkResult.cointegration;
  if(!passed){
    clearSummary();
    return;
  }
  const arr = (blockContrib['J1井区'] || []).map(x=>x.tfp).filter(Number.isFinite);
  if(!arr.length){
    clearSummary();
    return;
  }
  const avg = arr.reduce((a,b)=>a+b,0)/arr.length;
  const mn = Math.min(...arr), mx = Math.max(...arr);
  document.getElementById('avgTFP').textContent = pct(avg);
  document.getElementById('rangeTFP').textContent = `${pct(mn)} ~ ${pct(mx)}`;
  document.getElementById('minTFP').textContent = pct(mn);
  document.getElementById('maxTFP').textContent = pct(mx);
}

function renderBlockContrib(checkResult){
  const activeDims = dimensions.map(dim=>({id:dim.id,name:dim.name,indicator:selectedIndicator(dim)})).filter(dim=>dim.indicator);
  const passed = checkResult && checkResult.stationarity && checkResult.cointegration;
  const block = document.getElementById('blockSel').value || 'J1井区';
  const arr = passed ? (blockContrib[block] || []) : [];
  let h = '<thead><tr><th>时期</th><th>产量增长率/%</th>';
  activeDims.forEach(dim=>{ h += `<th>${escapeHtml(dim.name)}贡献/%</th>`; });
  h += '<th><b>科研贡献/%</b></th></tr></thead><tbody>';
  arr.forEach(r=>{
    h += `<tr><td>${r.period}</td><td>${fmt2(r.growth,2)}</td>`;
    activeDims.forEach(dim=>{ h += `<td>${fmt2(r.dims[dim.id],2)}</td>`; });
    h += `<td><b class="good">${fmt2(r.tfp,2)}</b></td></tr>`;
  });
  h += '</tbody>';
  document.getElementById('contribTable').innerHTML = h;
}

function resetAll(){
  rows = hydrateRows(clone(DEFAULT_ROWS));
  dimensions = normalizeDimensions(clone(DEFAULT_DIMENSIONS));
  renderBlockSel();
  renderDimensionEditor();
  renderDataTable();
  recalc();
}

function recalc(){
  syncFromDom();
  const activeDims = dimensions.map(dim=>({id:dim.id,name:dim.name,indicator:selectedIndicator(dim)})).filter(dim=>dim.indicator);
  renderBlockSel();
  betas = estimateBetas(buildDiffRows(activeDims), activeDims);
  blockContrib = computeContribs(buildDiffRows(activeDims), activeDims, betas);
  const checkResult = renderSimpleChecks(activeDims);
  renderBetas(activeDims, checkResult);
  renderSummary(checkResult);
  renderBlockContrib(checkResult);
}

dimensions = normalizeDimensions(clone(DEFAULT_DIMENSIONS));
rows = hydrateRows(clone(DEFAULT_ROWS));
renderBlockSel();
renderDimensionEditor();
renderDataTable();
recalc();
</script>
