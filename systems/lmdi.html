<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LMDI法科研贡献测算系统</title>
<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --line: #e5e7eb;
  --text: #1f2937;
  --muted: #64748b;
  --primary: #2563eb;
  --primary-soft: #dbeafe;
  --good: #059669;
  --warn: #d97706;
  --bad: #dc2626;
  --shadow: 0 10px 30px rgba(15, 23, 42, .08);
  --radius: 18px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
  background: linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
  color: var(--text);
}
.wrap { max-width: 1480px; margin: 0 auto; padding: 24px; }
.hero {
  background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 55%, #60a5fa 100%);
  color: white;
  padding: 28px 30px;
  border-radius: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}
.hero h1 { margin: 0; font-size: 30px; }
.grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 22px; }
@media (max-width: 1200px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: var(--card);
  border: 1px solid rgba(229, 231, 235, .92);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 22px;
  margin-bottom: 22px;
}
.title { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.title h2 { margin: 0; font-size: 20px; }
.badge { font-size: 12px; color: var(--primary); background: var(--primary-soft); padding: 6px 10px; border-radius: 999px; font-weight: 700; }
.inputs { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
@media (max-width: 900px) { .inputs { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 6px; }
label { font-size: 13px; font-weight: 700; color: #374151; }
input, select, textarea {
  width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
  font-size: 14px; color: var(--text); background: #fff; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(37, 99, 235, .1); }
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
button { border: none; border-radius: 12px; padding: 10px 15px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: #eef2ff; color: #3730a3; }
.btn-light { background: #f3f4f6; color: #111827; }
.btn-danger { background: #fef2f2; color: #b91c1c; }
.btn-row { padding: 7px 12px; font-size: 12px; border-radius: 10px; }
.metric-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
@media (max-width: 860px) { .metric-grid { grid-template-columns: 1fr; } }
.metric { border: 1px solid var(--line); border-radius: 16px; padding: 16px; background: #fff; }
.metric .k { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.metric .v { font-size: 28px; font-weight: 800; }
.metric .s { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }
.table-wrap { overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { border-bottom: 1px solid var(--line); padding: 9px 8px; text-align: center; white-space: nowrap; }
th { background: #f8fafc; color: #374151; position: sticky; top: 0; z-index: 1; }
.data-input { min-width: 90px; padding: 8px 10px; border-radius: 10px; }
.data-input.year-input { min-width: 82px; }
.actions-col { min-width: 86px; }
.bars { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
.bar-row { display: grid; grid-template-columns: 132px 1fr 96px; gap: 12px; align-items: center; }
.bar-label { font-size: 13px; font-weight: 700; }
.bar { height: 16px; background: #eef2f7; border-radius: 999px; overflow: hidden; position: relative; }
.bar span { position: absolute; top: 0; bottom: 0; border-radius: 999px; }
.summary { margin-top: 14px; background: #f8fafc; border: 1px solid var(--line); border-radius: 16px; padding: 16px; font-size: 14px; line-height: 1.85; }
.good { color: var(--good); }
.warn { color: var(--warn); }
.bad { color: var(--bad); }
.pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
.pill.good { background: #ecfdf5; color: var(--good); }
.pill.warn { background: #fff7ed; color: var(--warn); }
.pill.bad { background: #fef2f2; color: var(--bad); }
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>LMDI法科研贡献测算系统</h1>
  </section>

  <div class="grid">
    <div>
      <section class="card">
        <div class="title">
          <h2>① 参数设置</h2>
        </div>
        <div class="inputs">
          <div class="field">
            <label>基期</label>
            <select id="baseYear"></select>
          </div>
          <div class="field">
            <label>报告期</label>
            <select id="reportYear"></select>
          </div>
          <div class="field">
            <label>科研资本折旧率 δ</label>
            <input id="deltaInput" type="number" min="0" max="0.9" step="0.01" value="0.22" />
          </div>
        </div>
        <div class="toolbar">
          <button class="btn-primary" onclick="calculate()">开始测算</button>
          <button class="btn-secondary" onclick="resetDemo()">恢复默认数据</button>
          <button class="btn-light" onclick="fillYears()">刷新年份下拉框</button>
        </div>
      </section>

      <section class="card">
        <div class="title">
          <h2>② 年度输入数据</h2>
          <span class="badge">支持增删行与年份输入</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>年份</th>
                <th>原油产量 Q（万吨）</th>
                <th>开发投资 I（万元）</th>
                <th>勘探阶段科研投资（万元）</th>
                <th>开发阶段科研投资（万元）</th>
                <th>科研投入 S（万元）</th>
                <th>在产井数 N（口）</th>
                <th class="actions-col">操作</th>
              </tr>
            </thead>
            <tbody id="dataBody"></tbody>
          </table>
        </div>
        <div class="toolbar">
          <button class="btn-secondary" onclick="addRow()">新增一行</button>
        </div>
      </section>
    </div>

    <div>
      <section class="card">
        <div class="title">
          <h2>③ 核心结果</h2>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <div class="k">基期科研资本 K₀</div>
            <div class="v" id="metricK0">--</div>
            <div class="s"></div>
          </div>
          <div class="metric">
            <div class="k">报告期科研资本 Kₜ</div>
            <div class="v" id="metricKT">--</div>
            <div class="s"></div>
          </div>
          <div class="metric">
            <div class="k">科研转化贡献率</div>
            <div class="v" id="metricResearch">--</div>
            <div class="s"></div>
          </div>
        </div>
        <div class="bars" id="bars"></div>
        <div class="summary" id="summaryText">点击“开始测算”后显示结果。</div>
      </section>

      <section class="card">
        <div class="title">
          <h2>④ 详细计算表</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>年份</th>
                <th>Q</th>
                <th>I</th>
                <th>S</th>
                <th>N</th>
                <th>K</th>
                <th>I/N</th>
                <th>K/I</th>
                <th>Q/K</th>
              </tr>
            </thead>
            <tbody id="calcBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
const defaultRows = [
  { year: 2019, oil_output: 32.0, develop_invest: 1677.73, explore_rd: 134.38, develop_rd: 167.77, active_wells: 18.0 },
  { year: 2020, oil_output: 36.0, develop_invest: 1696.46, explore_rd: 135.81, develop_rd: 169.65, active_wells: 19.0 },
  { year: 2021, oil_output: 42.0, develop_invest: 1715.45, explore_rd: 137.1, develop_rd: 171.55, active_wells: 20.0 },
  { year: 2022, oil_output: 50.0, develop_invest: 1733.83, explore_rd: 138.46, develop_rd: 173.38, active_wells: 21.0 },
  { year: 2023, oil_output: 63.0, develop_invest: 1748.18, explore_rd: 139.92, develop_rd: 174.82, active_wells: 22.0 },
  { year: 2024, oil_output: 95.0, develop_invest: 1759.32, explore_rd: 141.21, develop_rd: 175.93, active_wells: 23.0 },
  { year: 2025, oil_output: 151.0, develop_invest: 1771.03, explore_rd: 142.17, develop_rd: 177.1, active_wells: 24.0 }
];
let rows = JSON.parse(JSON.stringify(defaultRows));

function fmtNum(v, d = 2) {
  if (!isFinite(v)) return '--';
  return Number(v).toFixed(d);
}
function fmtPct(v, d = 2) {
  if (!isFinite(v)) return '--';
  return (v * 100).toFixed(d) + '%';
}
function colorClass(v) {
  if (!isFinite(v)) return 'warn';
  if (v > 0.0001) return 'good';
  if (v < -0.0001) return 'bad';
  return 'warn';
}
function logMean(a, b) {
  if (!(a > 0 && b > 0)) return NaN;
  if (Math.abs(a - b) < 1e-12) return a;
  return (a - b) / (Math.log(a) - Math.log(b));
}
function getNumeric(value) {
  const num = Number(value);
  return Number.isFinite(num) ? num : 0;
}
function getSortedYears() {
  return [...new Set(rows.map(r => Number(r.year)).filter(y => Number.isFinite(y) && y > 0))].sort((a, b) => a - b);
}
function loadTable() {
  const tbody = document.getElementById('dataBody');
  tbody.innerHTML = rows.map((r, idx) => `
    <tr>
      <td><input class="data-input year-input" type="number" step="1" value="${r.year}" onchange="updateCell(${idx}, 'year', this.value)"></td>
      <td><input class="data-input" type="number" step="any" value="${r.oil_output}" onchange="updateCell(${idx}, 'oil_output', this.value)"></td>
      <td><input class="data-input" type="number" step="any" value="${r.develop_invest}" onchange="updateCell(${idx}, 'develop_invest', this.value)"></td>
      <td><input class="data-input" type="number" step="any" value="${r.explore_rd}" onchange="updateCell(${idx}, 'explore_rd', this.value)"></td>
      <td><input class="data-input" type="number" step="any" value="${r.develop_rd}" onchange="updateCell(${idx}, 'develop_rd', this.value)"></td>
      <td>${fmtNum(getNumeric(r.explore_rd) + getNumeric(r.develop_rd), 2)}</td>
      <td><input class="data-input" type="number" step="any" value="${r.active_wells}" onchange="updateCell(${idx}, 'active_wells', this.value)"></td>
      <td><button class="btn-danger btn-row" onclick="deleteRow(${idx})">删除</button></td>
    </tr>
  `).join('');
}
function updateCell(idx, key, value) {
  rows[idx][key] = getNumeric(value);
  loadTable();
  fillYears();
}
function addRow() {
  const years = getSortedYears();
  const maxYear = years.length ? years[years.length - 1] : new Date().getFullYear();
  const lastRow = rows.length ? rows[rows.length - 1] : { oil_output: 0, develop_invest: 0, explore_rd: 0, develop_rd: 0, active_wells: 0 };
  rows.push({
    year: maxYear + 1,
    oil_output: getNumeric(lastRow.oil_output),
    develop_invest: getNumeric(lastRow.develop_invest),
    explore_rd: getNumeric(lastRow.explore_rd),
    develop_rd: getNumeric(lastRow.develop_rd),
    active_wells: getNumeric(lastRow.active_wells)
  });
  loadTable();
  fillYears();
}
function deleteRow(idx) {
  if (rows.length <= 2) {
    alert('至少保留两行数据后才能进行测算。');
    return;
  }
  rows.splice(idx, 1);
  loadTable();
  fillYears();
  calculate();
}
function fillYears() {
  const years = getSortedYears();
  const base = document.getElementById('baseYear');
  const report = document.getElementById('reportYear');
  if (!years.length) {
    base.innerHTML = '';
    report.innerHTML = '';
    return;
  }
  const currentBase = Number(base.value) || years[0];
  const currentReport = Number(report.value) || years[years.length - 1];
  base.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  report.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  base.value = years.includes(currentBase) ? currentBase : years[0];
  report.value = years.includes(currentReport) ? currentReport : years[years.length - 1];
}
function resetDemo() {
  rows = JSON.parse(JSON.stringify(defaultRows));
  loadTable();
  fillYears();
  calculate();
}
function validateRows() {
  if (rows.length < 2) return '至少需要两行数据。';
  const years = rows.map(r => Number(r.year));
  if (years.some(y => !Number.isFinite(y) || y <= 0 || !Number.isInteger(y))) return '年份需填写为正整数。';
  if (new Set(years).size !== years.length) return '年份不能重复，请检查输入数据。';
  for (const row of rows) {
    if (![row.oil_output, row.develop_invest, row.explore_rd, row.develop_rd, row.active_wells].every(v => Number.isFinite(Number(v)) && Number(v) > 0)) {
      return '产量、投资、科研投入和在产井数需为大于 0 的数值。';
    }
  }
  return '';
}
function buildSeries(delta) {
  const sorted = [...rows].sort((a, b) => a.year - b.year).map(r => {
    const S = getNumeric(r.explore_rd) + getNumeric(r.develop_rd);
    return {
      year: Number(r.year),
      oil_output: getNumeric(r.oil_output),
      develop_invest: getNumeric(r.develop_invest),
      explore_rd: getNumeric(r.explore_rd),
      develop_rd: getNumeric(r.develop_rd),
      active_wells: getNumeric(r.active_wells),
      S
    };
  });
  let prevK = null;
  sorted.forEach((r, idx) => {
    if (idx === 0) r.K = r.S;
    else r.K = (1 - delta) * prevK + r.S;
    prevK = r.K;
    r.I_per_N = r.develop_invest / r.active_wells;
    r.K_per_I = r.K / r.develop_invest;
    r.Q_per_K = r.oil_output / r.K;
  });
  return sorted;
}
function calcContribution(baseRow, reportRow) {
  const deltaQ = reportRow.oil_output - baseRow.oil_output;
  const L = logMean(reportRow.oil_output, baseRow.oil_output);
  if (!isFinite(L) || !isFinite(deltaQ) || Math.abs(deltaQ) < 1e-12) return null;
  const effects = [
    { key: 'N', label: '开发规模效应', value: L * Math.log(reportRow.active_wells / baseRow.active_wells) },
    { key: 'I/N', label: '单位规模投入效应', value: L * Math.log(reportRow.I_per_N / baseRow.I_per_N) },
    { key: 'K/I', label: '投资结构效应', value: L * Math.log(reportRow.K_per_I / baseRow.K_per_I) },
    { key: 'Q/K', label: '科研转化贡献', value: L * Math.log(reportRow.Q_per_K / baseRow.Q_per_K) }
  ];
  effects.forEach(e => e.rate = e.value / deltaQ);
  return { deltaQ, L, effects };
}
function renderCalcTable(series) {
  document.getElementById('calcBody').innerHTML = series.map(r => `
    <tr>
      <td>${r.year}</td>
      <td>${fmtNum(r.oil_output, 2)}</td>
      <td>${fmtNum(r.develop_invest, 2)}</td>
      <td>${fmtNum(r.S, 2)}</td>
      <td>${fmtNum(r.active_wells, 2)}</td>
      <td>${fmtNum(r.K, 2)}</td>
      <td>${fmtNum(r.I_per_N, 2)}</td>
      <td>${fmtNum(r.K_per_I, 4)}</td>
      <td>${fmtNum(r.Q_per_K, 4)}</td>
    </tr>
  `).join('');
}
function renderBars(effects) {
  const maxAbs = Math.max(...effects.map(e => Math.abs(e.rate)), 0.01);
  document.getElementById('bars').innerHTML = effects.map((e, idx) => {
    const w = Math.max(2, Math.abs(e.rate) / maxAbs * 100);
    const color = e.rate >= 0 ? ['#2563eb', '#7c3aed', '#059669', '#d97706'][idx % 4] : '#dc2626';
    return `
      <div class="bar-row">
        <div class="bar-label">${e.label}</div>
        <div class="bar"><span style="width:${w}%; background:${color};"></span></div>
        <div class="${colorClass(e.rate)}">${fmtPct(e.rate)}</div>
      </div>`;
  }).join('');
}
function clearOutputs(message) {
  document.getElementById('metricK0').textContent = '--';
  document.getElementById('metricKT').textContent = '--';
  document.getElementById('metricResearch').textContent = '--';
  document.getElementById('bars').innerHTML = '';
  document.getElementById('calcBody').innerHTML = '';
  document.getElementById('summaryText').textContent = message || '点击“开始测算”后显示结果。';
}
function calculate() {
  const delta = Number(document.getElementById('deltaInput').value);
  if (!(delta >= 0 && delta < 1)) {
    alert('折旧率 δ 请输入 0 到 1 之间的数值。');
    return;
  }
  const validationMessage = validateRows();
  if (validationMessage) {
    clearOutputs(validationMessage);
    alert(validationMessage);
    return;
  }
  fillYears();
  const series = buildSeries(delta);
  renderCalcTable(series);
  const baseYear = Number(document.getElementById('baseYear').value);
  const reportYear = Number(document.getElementById('reportYear').value);
  const baseRow = series.find(r => r.year === baseYear);
  const reportRow = series.find(r => r.year === reportYear);
  if (!baseRow || !reportRow || reportYear <= baseYear) {
    clearOutputs('请确保报告期晚于基期。');
    alert('请确保报告期晚于基期。');
    return;
  }
  const result = calcContribution(baseRow, reportRow);
  if (!result) {
    clearOutputs('当前口径下无法完成分解，请检查数据是否为正且基期、报告期产量不相同。');
    alert('当前口径下无法完成分解，请检查数据是否为正且基期、报告期产量不相同。');
    return;
  }
  document.getElementById('metricK0').textContent = fmtNum(baseRow.K, 2);
  document.getElementById('metricKT').textContent = fmtNum(reportRow.K, 2);
  const research = result.effects.find(e => e.key === 'Q/K');
  document.getElementById('metricResearch').textContent = fmtPct(research.rate);
  renderBars(result.effects);
  const detail = result.effects.map(e => `<div><strong>${e.label}</strong>：贡献率 <span class="pill ${colorClass(e.rate)}">${fmtPct(e.rate)}</span></div>`).join('');
  document.getElementById('summaryText').innerHTML = detail;
}

loadTable();
fillYears();
calculate();
</script>
</body>
</html>
