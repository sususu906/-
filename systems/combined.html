<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>科研贡献测算系统</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#172033;--line:#e6ebf2;--blue:#2563eb;--soft:#eaf2ff;--shadow:0 10px 30px rgba(15,23,42,.06);--r:18px;--navw:250px;--muted:#667085;--good:#027a48;--bad:#be123c;--warn:#b54708}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:1780px;margin:0 auto;padding:18px}
.header{background:linear-gradient(135deg,#1d4ed8,#2563eb 55%,#60a5fa);color:#fff;border-radius:22px;box-shadow:var(--shadow);padding:18px 22px;margin-bottom:16px}
.header h1{margin:0;font-size:28px}
.layout{display:grid;grid-template-columns:var(--navw) 1fr;gap:16px}
@media (max-width:1100px){.layout{grid-template-columns:1fr}.side{position:static}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.side{padding:14px;position:sticky;top:18px;height:fit-content}
.nav{display:grid;gap:10px}
.nav button,.toolbar button,.rateCard button,.reportHead button{border:none;border-radius:14px;padding:12px 14px;font-size:14px;font-weight:800;cursor:pointer}
.nav button{background:#f8fafc;color:#334155;border:1px solid var(--line);text-align:left}
.nav button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.main{padding:14px}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.toolbar .actions{display:flex;gap:10px;flex-wrap:wrap}
.toolbar button,.reportHead button{background:#eef2ff;color:#3730a3}
.toolbar button.primary,.reportHead button.primary{background:var(--blue);color:#fff}
.current{font-size:12px;color:var(--muted)}
.panel{display:none}
.panel.active{display:block}
.rateGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
@media (max-width:1200px){.rateGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:700px){.rateGrid{grid-template-columns:1fr}}
.rateCard{padding:18px;background:linear-gradient(180deg,#fff,#f8fbff)}
.rateCard h3{margin:0 0 14px;font-size:17px}
.rateValue{font-size:34px;font-weight:900;line-height:1.1;margin-bottom:16px}
.rateCard button{background:#eef2ff;color:#3730a3;padding:10px 14px}
.chartCard{padding:18px}
.chartWrap{height:360px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#f8fbff);padding:18px 18px 14px;display:flex;align-items:flex-end;gap:22px}
.barCol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.barValue{font-size:14px;font-weight:800;color:var(--text);margin-bottom:8px;min-height:20px}
.barTrack{width:100%;max-width:120px;height:250px;border-radius:14px;background:#eef2ff;display:flex;align-items:flex-end;overflow:hidden;border:1px solid #dbe4ff}
.barFill{width:100%;background:linear-gradient(180deg,#60a5fa,#2563eb);border-radius:14px 14px 0 0;height:0%}
.barLabel{margin-top:10px;font-size:13px;font-weight:700;color:#334155;text-align:center;line-height:1.4}
.frameHead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.frameHead h3{margin:0;font-size:18px}
.badge{font-size:12px;font-weight:800;color:var(--blue);background:var(--soft);padding:6px 10px;border-radius:999px}
.frameWrap{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}
iframe.full{width:100%;height:1280px;border:none;background:#fff}
.hiddenCollector{position:absolute;left:-9999px;top:-9999px;width:1280px;height:1280px;border:none;visibility:hidden}
.reportWrap{display:grid;gap:16px}
.reportHead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:2px}
.reportCurrent{font-size:12px;color:var(--muted)}
.reportMetricGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
@media (max-width:1200px){.reportMetricGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:700px){.reportMetricGrid{grid-template-columns:1fr}}
.metricCard{padding:16px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#f8fbff)}
.metricCard .k{font-size:12px;color:var(--muted)}
.metricCard .v{font-size:26px;font-weight:900;margin-top:6px}
.methodReport{padding:18px}
.methodReport h3{margin:0;font-size:18px}
.methodSub{font-size:12px;color:var(--muted)}
.methodHeader{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.methodBody{display:grid;grid-template-columns:.92fr 1.08fr;gap:14px}
@media (max-width:1180px){.methodBody{grid-template-columns:1fr}}
.subCard{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}
.subCard h4{margin:0 0 10px;font-size:15px}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:14px}
.reportTable{border-collapse:collapse;width:100%;min-width:680px}
.reportTable th,.reportTable td{padding:8px 10px;border-bottom:1px solid #eef2f7;text-align:center;white-space:nowrap;font-size:12px}
.reportTable th{background:#f8fafc;color:#475569;position:sticky;top:0;z-index:1}
.kvList{display:grid;gap:8px}
.kvRow{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dashed #e7edf5;font-size:13px}
.kvRow:last-child{border-bottom:none}
.kvRow span{color:var(--muted)}
.kvRow strong{text-align:right;word-break:break-word}
.empty{padding:18px;color:var(--muted);font-size:13px;text-align:center}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800;background:var(--soft);color:var(--blue)}
.good{color:var(--good);font-weight:800}
.bad{color:var(--bad);font-weight:800}
.warn{color:var(--warn);font-weight:800}
.sectionNote{font-size:12px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <section class="header"><h1>科研贡献测算系统</h1></section>
  <div class="layout">
    <aside class="card side">
      <div class="nav">
        <button data-tab="dashboard" class="active">集中展示</button>
        <button data-tab="report">输出结果报告</button>
        <button data-tab="dea">DEA+Malmquist 指数法</button>
        <button data-tab="lmdi">LMDI 法</button>
        <button data-tab="prod">生产函数法</button>
        <button data-tab="resid">余值法</button>
      </div>
    </aside>
    <main class="card main">
      <div class="toolbar">
        <div class="current">当前页面：<span id="currentLabel">集中展示</span></div>
        <div class="actions">
          <button id="reloadBtn">重新加载当前页</button>
          <button id="refreshRatesBtn" class="primary">刷新贡献率</button>
          <button id="refreshReportTopBtn">刷新输出结果报告</button>
        </div>
      </div>

      <section class="panel active" id="panel-dashboard">
        <div class="rateGrid">
          <div class="card rateCard"><h3>DEA+Malmquist 指数法</h3><div class="rateValue" id="rate-dea">--</div><button data-open="dea">进入</button></div>
          <div class="card rateCard"><h3>LMDI 法</h3><div class="rateValue" id="rate-lmdi">--</div><button data-open="lmdi">进入</button></div>
          <div class="card rateCard"><h3>生产函数法</h3><div class="rateValue" id="rate-prod">--</div><button data-open="prod">进入</button></div>
          <div class="card rateCard"><h3>余值法</h3><div class="rateValue" id="rate-resid">--</div><button data-open="resid">进入</button></div>
        </div>
        <div class="card chartCard">
          <div class="chartWrap">
            <div class="barCol"><div class="barValue" id="bar-text-dea">--</div><div class="barTrack"><div class="barFill" id="bar-dea"></div></div><div class="barLabel">DEA+Malmquist<br>贡献率</div></div>
            <div class="barCol"><div class="barValue" id="bar-text-lmdi">--</div><div class="barTrack"><div class="barFill" id="bar-lmdi"></div></div><div class="barLabel">LMDI<br>贡献率</div></div>
            <div class="barCol"><div class="barValue" id="bar-text-prod">--</div><div class="barTrack"><div class="barFill" id="bar-prod"></div></div><div class="barLabel">生产函数法<br>贡献率</div></div>
            <div class="barCol"><div class="barValue" id="bar-text-resid">--</div><div class="barTrack"><div class="barFill" id="bar-resid"></div></div><div class="barLabel">余值法<br>分成率</div></div>
          </div>
        </div>
      </section>

      <section class="panel" id="panel-report">
        <div class="reportWrap">
          <div class="reportHead">
            <div>
              <h3 style="margin:0;font-size:18px">输出结果报告</h3>
              <div class="reportCurrent">集中展示各方法当前输入数据与测算结果</div>
            </div>
            <div class="actions" style="display:flex;gap:10px;flex-wrap:wrap">
              <button id="refreshReportBtn" class="primary">刷新报告</button>
              <button id="exportReportBtn">导出HTML报告</button>
              <div class="reportCurrent" id="reportTime">--</div>
            </div>
          </div>
          <div class="reportMetricGrid">
            <div class="metricCard"><div class="k">DEA+Malmquist 指数法</div><div class="v" id="report-rate-dea">--</div></div>
            <div class="metricCard"><div class="k">LMDI 法</div><div class="v" id="report-rate-lmdi">--</div></div>
            <div class="metricCard"><div class="k">生产函数法</div><div class="v" id="report-rate-prod">--</div></div>
            <div class="metricCard"><div class="k">余值法</div><div class="v" id="report-rate-resid">--</div></div>
          </div>
          <div id="reportContent"></div>
        </div>
      </section>

      <section class="panel" id="panel-dea">
        <div class="frameHead"><h3>DEA+Malmquist 指数法</h3><span class="badge">当前版本</span></div>
        <div class="frameWrap"><iframe class="full" id="frame-dea" data-loaded="0"></iframe></div>
      </section>
      <section class="panel" id="panel-lmdi">
        <div class="frameHead"><h3>LMDI 法</h3><span class="badge">当前版本</span></div>
        <div class="frameWrap"><iframe class="full" id="frame-lmdi" data-loaded="0"></iframe></div>
      </section>
      <section class="panel" id="panel-prod">
        <div class="frameHead"><h3>生产函数法</h3><span class="badge">当前版本</span></div>
        <div class="frameWrap"><iframe class="full" id="frame-prod" data-loaded="0"></iframe></div>
      </section>
      <section class="panel" id="panel-resid">
        <div class="frameHead"><h3>余值法</h3><span class="badge">当前版本</span></div>
        <div class="frameWrap"><iframe class="full" id="frame-resid" data-loaded="0"></iframe></div>
      </section>
    </main>
  </div>
</div>
<iframe class="hiddenCollector" id="collector-dea"></iframe>
<iframe class="hiddenCollector" id="collector-lmdi"></iframe>
<iframe class="hiddenCollector" id="collector-prod"></iframe>
<iframe class="hiddenCollector" id="collector-resid"></iframe>

function b64ToUtf8(b64) {
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, ch => ch.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function setFrameSrc(id, key) {
  const frame = document.getElementById(id);
  if (!frame) return;
  frame.srcdoc = b64ToUtf8(moduleB64[key]);
  if (frame.dataset) frame.dataset.loaded = '1';
}
function ensureFullLoaded(key) {
  const frame = document.getElementById('frame-' + key);
  if (frame && frame.dataset.loaded !== '1') setFrameSrc('frame-' + key, key);
}
function ensureCollectorLoaded(key) {
  const frame = document.getElementById('collector-' + key);
  if (frame && !frame.srcdoc) frame.srcdoc = b64ToUtf8(moduleB64[key]);
}
function resizeFrame(frame) {
  if (!frame) return;
  try {
    const doc = frame.contentDocument;
    if (!doc) return;
    const h = Math.max(doc.documentElement.scrollHeight, doc.body ? doc.body.scrollHeight : 0, 1100);
    frame.style.height = (h + 28) + 'px';
  } catch (e) {}
}
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.getElementById('currentLabel').textContent = labelMap[tab] || '';
  if (['dea','lmdi','prod','resid'].includes(tab)) {
    ensureFullLoaded(tab);
    setTimeout(() => resizeFrame(document.getElementById('frame-' + tab)), 350);
  }
  if (tab === 'dashboard') refreshRates();
  if (tab === 'report') refreshReport();
}
function reloadCurrent() {
  if (currentTab === 'dashboard' || currentTab === 'report') {
    ['dea','lmdi','prod','resid'].forEach(k => setFrameSrc('collector-' + k, k));
    setTimeout(() => { refreshRates(); refreshReport(); }, 900);
    return;
  }
  setFrameSrc('frame-' + currentTab, currentTab);
  setTimeout(() => { resizeFrame(document.getElementById('frame-' + currentTab)); refreshRates(); refreshReport(); }, 900);
}
function readTextFromFrame(frame, selector) {
  try {
    const doc = frame?.contentDocument;
    if (!doc) return null;
    const el = doc.querySelector(selector);
    return el ? (el.textContent || '').trim() : null;
  } catch (e) { return null; }
}
function readValueFromFrame(frame, selector) {
  try {
    const doc = frame?.contentDocument;
    if (!doc) return null;
    const el = doc.querySelector(selector);
    return el ? (el.value ?? '').trim() : null;
  } catch (e) { return null; }
}
function safeEvalJSON(frame, expr) {
  try {
    const js = `(function(){try{return JSON.stringify(${expr});}catch(e){return null;}})()`;
    const raw = frame?.contentWindow?.eval(js);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function getPreferredFrame(key) {
  const full = document.getElementById('frame-' + key);
  if (full && full.dataset.loaded === '1' && full.contentDocument) return full;
  return document.getElementById('collector-' + key);
}
function parsePercent(text) {
  if (!text) return null;
  const m = String(text).replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return m ? Number(m[0]) : null;
}
function fmtNumber(v, d=2) {
  return Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '--';
}
function fmtText(v) {
  return v == null || v === '' ? '--' : String(v);
}
function nowText() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function tableHtml(headers, rows) {
  if (!rows || !rows.length) return '<div class="empty">暂无数据</div>';
  return `<div class="tableWrap"><table class="reportTable"><thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c == null ? '--' : escapeHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function kvHtml(items) {
  if (!items || !items.length) return '<div class="empty">暂无数据</div>';
  return `<div class="kvList">${items.map(item => `<div class="kvRow"><span>${escapeHtml(item.label)}</span><strong>${escapeHtml(item.value == null ? '--' : item.value)}</strong></div>`).join('')}</div>`;
}
function setBar(key, valueText) {
  const textEl = document.getElementById('bar-text-' + key);
  const fillEl = document.getElementById('bar-' + key);
  if (textEl) textEl.textContent = valueText || '--';
  const v = parsePercent(valueText);
  if (fillEl) fillEl.style.height = (v === null ? 0 : Math.max(2, Math.min(100, v))) + '%';
  const reportEl = document.getElementById('report-rate-' + key);
  if (reportEl) reportEl.textContent = valueText || '--';
}
function refreshRates() {
  Object.entries(rateConfig).forEach(([key, cfg]) => {
    let value = null;
    const full = document.getElementById('frame-' + key);
    if (full && full.dataset.loaded === '1') value = readTextFromFrame(full, cfg.selector);
    if (!value) value = readTextFromFrame(document.getElementById('collector-' + key), cfg.selector);
    const text = value || '--';
    document.getElementById('rate-' + key).textContent = text;
    setBar(key, text);
  });
}
function buildDEAReport() {
  const frame = getPreferredFrame('dea');
  const indicators = safeEvalJSON(frame, 'indicators') || [];
  const panelRows = safeEvalJSON(frame, 'panelRows') || [];
  const currentResult = safeEvalJSON(frame, 'currentResult') || null;
  const active = indicators.filter(x => x.role !== 'ignore');
  const indicatorRows = indicators.map(it => [it.label || it.key, it.role === 'input' ? '投入' : it.role === 'output' ? '产出' : '不参与']);
  const byYear = {};
  panelRows.forEach(r => {
    const y = r.year;
    if (!byYear[y]) byYear[y] = {count:0};
    byYear[y].count += 1;
    active.forEach(it => { byYear[y][it.key] = (byYear[y][it.key] || 0) + Number(r[it.key] || 0); });
  });
  const yearRows = Object.keys(byYear).sort((a,b)=>Number(a)-Number(b)).map(y => [y, byYear[y].count, ...active.map(it => fmtNumber(byYear[y][it.key], 2))]);
  const yearHeaders = ['年份','DMU数', ...active.map(it => it.label || it.key)];
  const resultRows = (currentResult && currentResult.resultRows ? currentResult.resultRows : []).map(r => [r.period, fmtNumber(r.tfpch,4), fmtNumber(r.effch,4), fmtNumber(r.techch,4), fmtNumber(r.growth,2), fmtNumber(r.contrib,2), r.n]);
  const outputSummary = kvHtml([
    {label:'DMU数量', value:readTextFromFrame(frame, '#kDMU') || '--'},
    {label:'投入指标数', value:readTextFromFrame(frame, '#kIn') || '--'},
    {label:'产出指标数', value:readTextFromFrame(frame, '#kOut') || '--'},
    {label:'2022-2025平均贡献率', value:readTextFromFrame(frame, '#kAvg') || '--'}
  ]);
  return `<div class="card methodReport"><div class="methodHeader"><div><h3>DEA+Malmquist 指数法</h3><div class="methodSub">当前指标设置、年度输入汇总与分解结果</div></div><span class="pill">${escapeHtml(readTextFromFrame(frame, '#kAvg') || '--')}</span></div><div class="methodBody"><div class="subCard"><h4>输入数据</h4>${tableHtml(['指标','角色'], indicatorRows)}<div style="height:12px"></div>${tableHtml(yearHeaders, yearRows)}</div><div class="subCard"><h4>输出结果</h4>${outputSummary}<div style="height:12px"></div>${currentResult && currentResult.error ? `<div class="empty">${escapeHtml(currentResult.error)}</div>` : tableHtml(['时期','tfpch','effch','techch','产量增长率/%','TFP贡献率/%','共同DMU数'], resultRows)}</div></div></div>`;
}
function buildLMDIReport() {
  const frame = getPreferredFrame('lmdi');
  const state = safeEvalJSON(frame, '(function(){const delta=Number(document.getElementById("deltaInput").value||0.22); const series=buildSeries(delta); const baseYear=Number(document.getElementById("baseYear").value); const reportYear=Number(document.getElementById("reportYear").value); const baseRow=series.find(r=>r.year===baseYear)||null; const reportRow=series.find(r=>r.year===reportYear)||null; const result=(baseRow&&reportRow&&reportYear>baseYear)?calcContribution(baseRow,reportRow):null; return {delta, baseYear, reportYear, series, result};})()') || {series:[]};
  const inputRows = (state.series || []).map(r => [r.year, fmtNumber(r.oil_output,2), fmtNumber(r.develop_invest,2), fmtNumber(r.explore_rd,2), fmtNumber(r.develop_rd,2), fmtNumber(r.S,2), fmtNumber(r.active_wells,2)]);
  const effectRows = (((state.result || {}).effects) || []).map(e => [e.label, fmtNumber(e.value,4), (Number.isFinite(e.rate) ? (e.rate*100).toFixed(2)+'%' : '--')]);
  const summary = kvHtml([
    {label:'基期', value:fmtText(state.baseYear)},
    {label:'报告期', value:fmtText(state.reportYear)},
    {label:'科研资本折旧率 δ', value:fmtNumber(state.delta,2)},

  ]);

function buildProdReport() {

  const passed = readTextFromFrame(frame, '#stationarityStatus') === '通过' && readTextFromFrame(frame, '#cointegrationStatus') === '通过';
  const betaRows = activeDims.map(dim => [dim.name, dim.label, passed ? fmtNumber((state.betas || {})[dim.id],4) : '--']);
  const contribArr = ((state.blockContrib || {})[state.currentBlock] || []);
  const contribRows = contribArr.map(r => [r.period, fmtNumber(r.growth,2), ...activeDims.map(dim => fmtNumber((r.dims || {})[dim.id],2)), fmtNumber(r.tfp,2)]);
  const contribHeaders = ['时期','产量增长率/%', ...activeDims.map(dim => dim.name + '贡献/%'), '科研贡献/%'];
  const summary = kvHtml([
    {label:'平稳性检验', value:readTextFromFrame(frame, '#stationarityStatus') || '--'},
    {label:'协整检验', value:readTextFromFrame(frame, '#cointegrationStatus') || '--'},
    {label:'当前区块', value:state.currentBlock || 'J1井区'},
    {label:'平均科研贡献', value:readTextFromFrame(frame, '#avgTFP') || '--'},
    {label:'科研贡献范围', value:readTextFromFrame(frame, '#rangeTFP') || '--'}
  ]);
  return `<div class="card methodReport"><div class="methodHeader"><div><h3>生产函数法</h3><div class="methodSub">当前维度设置、输入样本与贡献结果</div></div><span class="pill">${escapeHtml(readTextFromFrame(frame, '#avgTFP') || '--')}</span></div><div class="methodBody"><div class="subCard"><h4>输入数据</h4>${tableHtml(['维度','当前选中指标'], dimRows)}<div style="height:12px"></div>${tableHtml(['区块','年份','原油产量', ...activeDims.map(dim => dim.label)], inputRows)}</div><div class="subCard"><h4>输出结果</h4>${summary}<div style="height:12px"></div>${tableHtml(['维度','指标','弹性'], betaRows)}<div style="height:12px"></div>${tableHtml(contribHeaders, contribRows)}</div></div></div>`;
}
function buildResidReport() {
  const frame = getPreferredFrame('resid');
  const state = safeEvalJSON(frame, '(function(){return {mode:sMode, lastResult:lastResult, detailedFactors:detailedFactors, quickSFactors:quickSFactors, techIndicators:techIndicators, SData:(sMode==="detailed"?collectDetailed():collectQuick()), techData:collectTech()};})()') || {mode:'detailed', lastResult:null};
  const lastResult = state.lastResult || {project:{}, input:{detailed:{}, quick:{}, tech:{}}, output:{}};
  const projectSummary = kvHtml([
    {label:'项目名称', value:lastResult.project?.name || readValueFromFrame(frame, '#projectName') || '--'},
    {label:'项目收益净值 Ez（亿元）', value:fmtText(lastResult.project?.ez ?? readValueFromFrame(frame, '#netIncome'))},
    {label:'油气藏类型', value:lastResult.project?.type || readValueFromFrame(frame, '#projectType') || '--'},
    {label:'业务阶段', value:lastResult.project?.stageType || readValueFromFrame(frame, '#projectStageType') || '--'},
    {label:'阶段位置', value:lastResult.project?.stage || readValueFromFrame(frame, '#projectStage') || '--'},
    {label:'S 评价模式', value:state.mode === 'quick' ? '快捷评价' : '详细评价'}
  ]);
  let sRows = [];
  if (state.mode === 'quick') {
    sRows = (state.quickSFactors || []).map(item => [item.name, lastResult.input?.quick?.[item.key] || '--']);
  } else {
    ['capital','management','labor'].forEach(groupKey => {
      const label = groupKey === 'capital' ? '资本' : groupKey === 'management' ? '管理' : '劳动';
      (state.detailedFactors?.[groupKey] || []).forEach(item => sRows.push([label, item.name, lastResult.input?.detailed?.[item.key] || '--']));
    });
  }
  const techRows = (state.techIndicators || []).map(item => {
    const techInput = lastResult.input?.tech?.[item.key] || {};
    return [item.group, item.name, techInput.level || '--', techInput.custom === '' ? '--' : (techInput.custom || '--')];
  });
  const outputSummary = kvHtml([
    {label:'非技术要素分成率 S', value:readTextFromFrame(frame, '#metricS') || '--'},
    {label:'阶段调整系数 H', value:readTextFromFrame(frame, '#metricH') || '--'},
    {label:'技术创新强度系数 Tz', value:readTextFromFrame(frame, '#metricTz') || '--'},
    {label:'技术要素收益分成率', value:readTextFromFrame(frame, '#metricFxz') || '--'},
    {label:'技术贡献净值（亿元）', value:readTextFromFrame(frame, '#finalYz') || '--'}
  ]);
  const breakdownRows = (((state.SData || {}).breakdown) || []).map(r => [r.name, (Number.isFinite(r.value) ? (r.value*100).toFixed(2)+'%' : '--')]).concat((((state.techData || {}).groups) || []).map(r => [r.name, (Number.isFinite(r.value) ? (r.value*100).toFixed(2)+'%' : '--')]));
  return `<div class="card methodReport"><div class="methodHeader"><div><h3>余值法</h3><div class="methodSub">项目输入、评价等级与最终测算结果</div></div><span class="pill">${escapeHtml(readTextFromFrame(frame, '#metricFxz') || '--')}</span></div><div class="methodBody"><div class="subCard"><h4>输入数据</h4>${projectSummary}<div style="height:12px"></div>${tableHtml(state.mode === 'quick' ? ['快捷评价项','等级'] : ['维度','评价项','等级'], sRows)}<div style="height:12px"></div>${tableHtml(['技术类别','技术指标','等级','自定义得分'], techRows)}</div><div class="subCard"><h4>输出结果</h4>${outputSummary}<div style="height:12px"></div>${tableHtml(['构成项','当前值'], breakdownRows)}</div></div></div>`;
}
function refreshReport() {

}
